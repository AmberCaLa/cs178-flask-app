<!doctype html>
<html lang="en">
  <head>
    <title>Add Complete Movie</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  </head>
  <body>
    <a href="/" class = "btn btn-primary">Return</a>
    <h1>Please enter the following info to log a movie.</h1>
    <form action="{{ url_for('add_complete_movie') }}" method="post">
      <label for="user_name">What is your username?:</label><br />
      <input type="text" id="user_name" name="user_name" required /><br />
      <label for="movie_name">What movie did you complete?:</label><br />
      <input type="text" id="movie_name" name="movie_name" required /><br />
      <label for="rating">What do you rate the movie out of 10?:</label><br />
      <input type="number" id="rating" name="rating" required /><br />
      <label for="review">Please leave a review:</label><br />
      <input type="text" id="review" name="review" required /><br />
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
