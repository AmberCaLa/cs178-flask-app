<!DOCTYPE html>
<html lang="en">
<head>
    <title>Home Page</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="container">
        <h1 class="mt-5">Movie Browser</h1>
        <div class="mt-3">
            <a href="/view-movies" class = "btn btn-danger">View Movies</a>
            <a href="/find-movie" class = "btn btn-warning">Find Movie</a>
            <a href="/by-director" class = "btn btn-success">Movies by Director</a>
            <a href="/with-actor" class = "btn btn-primary">Movies with Actor</a>
            <a href="/of-genre" class = "btn btn-danger">Movies of Genre</a>



        </div>
    </div>
</body>
</html>
